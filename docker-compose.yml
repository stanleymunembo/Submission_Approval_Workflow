# ============================================================
# DOCKER COMPOSE — 3 services (database + backend + frontend)
# ============================================================
#
# START (from project root):
#   docker compose up --build
#
# WHAT STARTS:
#   1. database  → PostgreSQL + your SQL scripts (tables + demo data)
#   2. backend   → waits for database, then starts API on port 4000
#   3. frontend  → React website on port 5173
#
# OPEN: http://localhost:5173
#
# NOTE: Stop your local PostgreSQL if it uses port 5432, or Docker will fail.

services:

  # ==================== DATABASE (PostgreSQL) ====================
  database:
    image: postgres:16-alpine
    container_name: submission-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: Applicant_Reviewer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      # Saves data between restarts
      - postgres_data:/var/lib/postgresql/data
      # Auto-run on FIRST start only (creates tables)
      - ./Backend/Scripts/sql/001_create_schema.sql:/docker-entrypoint-initdb.d/001_create_schema.sql
      # Auto-run on FIRST start only (demo users + sample apps)
      - ./Backend/Scripts/sql/002_seed_data.sql:/docker-entrypoint-initdb.d/002_seed_data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Applicant_Reviewer_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ==================== BACKEND (Express API) ====================
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: submission-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: Applicant_Reviewer_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: demo_jwt_secret_for_docker
      PORT: 4000
    depends_on:
      database:
        condition: service_healthy

  # ==================== FRONTEND (React) ====================
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    container_name: submission-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
