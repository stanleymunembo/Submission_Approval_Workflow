# ============================================================
# DOCKER COMPOSE
# ============================================================
# One file to start ALL services:
#   db       = PostgreSQL database
#   backend  = Express API
#   frontend = React website
#
# Start command (from project root):
#   docker compose up --build

services:

  # ---------------- DATABASE ----------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: Applicant_Reviewer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend/Scripts/sql/001_create_schema.sql:/docker-entrypoint-initdb.d/001_create_schema.sql
      - ./Backend/Scripts/sql/002_seed_data.sql:/docker-entrypoint-initdb.d/002_seed_data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Applicant_Reviewer_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------- BACKEND ----------------
  backend:
    build: ./Backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: Applicant_Reviewer_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: demo_jwt_secret_for_docker
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy

  # ---------------- FRONTEND ----------------
  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_URL: http://localhost:4000
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
